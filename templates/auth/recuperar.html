{% extends 'base.html' %}
{% block title %}Recuperar contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <h2 class="mb-4">Recuperar contraseña</h2>
        <p class="text-muted">Ingresá tu email y te enviaremos un link para restablecer tu contraseña.</p>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Enviar email</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{{ url_for('auth.login') }}">Volver al login</a>
        </div>
    </div>
</div>
{% endblock %}
